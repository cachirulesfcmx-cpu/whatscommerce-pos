services:
  postgres:
    image: postgres:16-alpine
    container_name: whatscommerce_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: whatscommerce
      POSTGRES_PASSWORD: whatscommerce
      POSTGRES_DB: whatscommerce
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U whatscommerce"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: whatscommerce_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
