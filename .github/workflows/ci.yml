name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  quality:
    name: Lint · Typecheck · Test
    runs-on: ubuntu-latest
    env:
      # Dummy values: Prisma generate + Next typecheck don't connect to the DB.
      DATABASE_URL: "postgresql://user:pass@localhost:5432/db?schema=public"
      DIRECT_URL: "postgresql://user:pass@localhost:5432/db?schema=public"
      AUTH_SECRET: "ci-dummy-secret-not-used"
      NEXT_PUBLIC_APP_URL: "http://localhost:3000"
      NEXT_PUBLIC_ROOT_DOMAIN: "whatscommerce.com"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Prisma generate
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test
